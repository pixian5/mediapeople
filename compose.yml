services:
  # 唯一公网入口：根目录为 uniapp H5，客户/红娘/后台共用同一域名和端口。
  gateway:
    image: nginx:1.27-alpine
    container_name: matchmaker-gateway
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "21314:443"
    volumes:
      - ./uniapp/dist/build/h5:/usr/share/nginx/html:ro
      - ./deploy/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/.acme.sh/sbbz.tech_ecc/fullchain.cer:/etc/nginx/certs/fullchain.cer:ro
      - /root/.acme.sh/sbbz.tech_ecc/sbbz.tech.key:/etc/nginx/certs/privkey.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./server
    container_name: matchmaker-api
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-matchmaker}
      PGUSER: ${POSTGRES_USER:-matchmaker}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-matchmaker-dev-secret-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    container_name: matchmaker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matchmaker}
      POSTGRES_USER: ${POSTGRES_USER:-matchmaker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backup/postgres:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
