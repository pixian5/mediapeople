name: Deploy to Server

on:
  push:
    branches: [master]

concurrency:
  group: matchmaker-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm ci
        working-directory: uniapp
      - run: npm run build:h5
        working-directory: uniapp
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: uk.sbbz.tech
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/matchmaker
            bash /opt/matchmaker/deploy/auto-deploy.sh
