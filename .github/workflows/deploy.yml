name: Deploy to Server

on:
  push:
    branches: [master]

# 最小权限：部署只需读取仓库内容
permissions:
  contents: read

concurrency:
  group: matchmaker-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm ci --legacy-peer-deps
        working-directory: uniapp
      - run: npm run build:h5
        working-directory: uniapp
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: uk.sbbz.tech
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            cd /opt/matchmaker
            bash /opt/matchmaker/deploy/auto-deploy.sh
