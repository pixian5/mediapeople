services:
  web-ssl:
    image: nginx:1.27-alpine
    container_name: mediapeople-web-ssl
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "9445:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./deploy/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/.acme.sh/sbbz.tech_ecc/fullchain.cer:/etc/nginx/certs/fullchain.cer:ro
      - /root/.acme.sh/sbbz.tech_ecc/sbbz.tech.key:/etc/nginx/certs/privkey.key:ro

