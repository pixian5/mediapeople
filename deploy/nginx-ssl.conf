# 限流 zone：登录/注册/发消息等敏感端点 10r/m，全局 30r/s
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_zone:10m rate=10r/s;

server {
    listen 443 ssl;
    server_name uk.sbbz.tech sbbz.tech _;

    ssl_certificate /etc/nginx/certs/fullchain.cer;
    ssl_certificate_key /etc/nginx/certs/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # 隐藏 nginx 版本
    server_tokens off;

    # 客户端请求体限制 2MB（与 Express body-parser 一致）
    client_max_body_size 2m;

    # 超时配置
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    root /usr/share/nginx/html;
    index index.html;

    # 全局安全 HTTP 头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # uniapp H5 的 history 路由覆盖客户、红娘和管理后台页面。
    # /pages/* 是 uniapp 的页面路由，不能当作真实文件返回 404。

    location = /api/reset {
        return 404;
    }

    # 登录/注册/兑换等敏感端点额外限流
    location ~ ^/api/(auth/|client/vip/redeem|client/real-name) {
        limit_req zone=auth_zone burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 代理缓冲
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /ws {
        limit_req zone=ws_zone burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 长连接超时：5 分钟
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /webhook {
        proxy_pass http://host.docker.internal:9000/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js)$ {
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # 自定义 429 响应
    error_page 429 = @too_many_requests;
    location @too_many_requests {
        default_type application/json;
        add_header Retry-After "60" always;
        return 429 '{"error":"too_many_requests","message":"请求过于频繁，请稍后再试"}';
    }
}

# HTTP -> HTTPS 跳转（监听 80 端口）
server {
    listen 80;
    server_name uk.sbbz.tech sbbz.tech _;
    return 301 https://$host$request_uri;
}
