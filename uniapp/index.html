<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // 在 uniapp 路由初始化前保存深链接，避免未登录时丢失目标角色。
      (function captureInitialHash() {
        function capture() {
          var hash = window.location.hash
          if (!hash.startsWith('#/pages/')) return
          window.__MATCHMAKER_INITIAL_HASH__ = hash
          try {
            window.sessionStorage.setItem('__MATCHMAKER_INITIAL_HASH__', hash)
          } catch (error) {}
        }
        capture()
        window.addEventListener('hashchange', capture, true)
      })()
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title></title>
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
